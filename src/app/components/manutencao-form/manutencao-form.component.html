<div class="manutencao-form">
  <h3>{{ manutencao ? 'Editar Manutenção' : 'Registrar Manutenção' }}</h3>

  <form [formGroup]="form" (ngSubmit)="salvarManutencao()">
    <div class="field">
      <label>Data</label>
      <input type="date" formControlName="data" />
    </div>

    <div class="field">
      <label>Serviço</label>
      <input type="text" placeholder="Ex: Troca de óleo" formControlName="servico" />
    </div>

    <div class="field">
      <label>Profissional</label>
      <input type="text" placeholder="Ex: João da Silva" formControlName="profissional" />
    </div>

    <div class="field">
      <label>Observação</label>
      <textarea placeholder="Detalhes adicionais..." formControlName="observacao"></textarea>
    </div>

    

    <div class="field">
      <label>Peças Utilizadas</label>
      <div class="field-inline">
        <input placeholder="Adicionar por nome" formControlName="novasPecas" />
        <button type="button" (click)="adicionarPecaPorNome(form.get('novasPecas')?.value)">Adicionar</button>
      </div>
      <div class="pecas-lista">
        <div *ngFor="let peca of pecasDisponiveis" class="peca-item" [class.low-stock]="peca.quantidade <= peca.estoqueMinimo">
          <button type="button" (click)="adicionarPeca(peca)" [disabled]="peca.quantidade <= 0">
            + {{ peca.nome }}
            <span class="peca-qty" *ngIf="peca.quantidade >= 0">({{ peca.quantidade }})</span>
          </button>
          <span class="sem-estoque" *ngIf="peca.quantidade <= 0">Sem estoque</span>
        </div>
      </div>
      <div *ngIf="form.get('pecasUtilizadas')?.value?.length" class="pecas-selecionadas">
        <h4>Selecionadas:</h4>
        <div *ngFor="let pecaId of form.get('pecasUtilizadas')?.value" class="peca-tag">
          {{ getNomePeca(pecaId) }}
          <button type="button" (click)="removerPeca(pecaId)">✕</button>
        </div>
      </div>
    </div>

    <div class="actions">
      <button type="submit">Salvar</button>
      <button type="button" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</div>
